services:
  bot:
    build: .
    restart: unless-stopped
    # All configuration (incl. DATABASE_URL/LOG_FORMAT overrides) comes from
    # .env — nothing is pinned here, so the documented Postgres path works
    # under Docker too. Default: SQLite on the named volume below.
    env_file: .env
    volumes:
      - hackqueue-data:/app/data
      # Uncomment to tune scoring without rebuilding:
      # - ./scoring.toml:/app/scoring.toml:ro

volumes:
  hackqueue-data:
