# Dev convenience for running alembic by hand (revision --autogenerate etc.).
# At runtime the bot applies migrations itself with the DATABASE_URL from .env.
[alembic]
script_location = hackqueue/db/migrations
prepend_sys_path = .
sqlalchemy.url = sqlite+aiosqlite:///data/hackqueue.db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
